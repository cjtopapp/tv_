var idx=0;
var mode="";
var v=document.getElementById("v");
var img=document.getElementById("img");
var clicked=false;
var imgTimer=null;

function getMode(){
var h=new Date().getHours();
var m=new Date().getMinutes();
var t=h*60+m;
if(t>=779&&t<839)return "lunch";
return "normal";
}

function next(){
var list=(mode==="lunch")?lunch:normal;
idx=(idx+1)%list.length;
play();
}

function play(){
var cur=getMode();
if(cur!==mode){mode=cur;idx=0;}
var list=(mode==="lunch")?lunch:normal;
var item=list[idx];
if(imgTimer){clearTimeout(imgTimer);imgTimer=null;}
if(item.type==="video"){
img.style.display="none";
v.style.display="block";
v.src=item.src;
if(mode==="lunch"&&clicked){v.muted=false;}
else{v.muted=true;}
v.play();
}else{
v.pause();
v.style.display="none";
img.style.display="block";
img.src=item.src;
imgTimer=setTimeout(function(){next();},item.duration);
}
}

v.addEventListener("ended",function(){next();});
v.addEventListener("error",function(){next();});

play();

setInterval(function(){
var cur=getMode();
if(cur!==mode)play();
},10000);

document.body.addEventListener("click",function(){
clicked=true;
if(mode==="lunch"){v.muted=false;}
if(document.fullscreenElement)return;
document.documentElement.requestFullscreen().catch(function(){});
});
